<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veg Menu - Team Spirit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            text-align: center;
        }
        .header {
            background-color: #ff5722;
            color: white;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
        }
        .menu-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .menu-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            width: 250px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }
        .menu-item img {
            width: 100%;
            border-radius: 10px;
        }
        .menu-item h3 {
            margin: 10px 0 5px;
        }
        .menu-item p {
            font-size: 14px;
            color: #666;
        }
        .price {
            font-weight: bold;
            margin: 10px 0;
        }
        .add-btn {
            background-color: green;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }
        .add-btn:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>
    <div class="header">TEAM SPIRIT - VEG MENU</div>
    <div class="menu-container">
        <div class="menu-item">
            <img src="dish1.jpg" alt="Dish Image">
            <h3>Paneer Butter Masala</h3>
            <p>Delicious paneer in a creamy tomato-based gravy.</p>
            <div class="price">₹299</div>
            <button class="add-btn">Add</button>
        </div>
        <div class="menu-item">
            <img src="dish2.jpg" alt="Dish Image">
            <h3>Veg Biryani</h3>
            <p>Flavored basmati rice cooked with fresh vegetables.</p>
            <div class="price">₹199</div>
            <button class="add-btn">Add</button>
        </div>
    </div>
</body>
</html>
