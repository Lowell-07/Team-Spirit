<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e0f7fa;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .header {
            background-color: #00bcd4;
            color: white;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            width: 250px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        .card img {
            width: 100%;
            height: 150px;
            border-radius: 10px;
        }
        .name {
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }
        .details {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
        }
        .price {
            font-size: 18px;
            font-weight: bold;
            color: #00796b;
            margin-bottom: 10px;
        }
        .add-btn {
            background-color: #008000;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .add-btn:hover {
            background-color: #006600;
        }
    </style>
</head>
<body>

    <div class="header">Ice Cream Menu</div>

    <div class="container">
        <div class="card">
            <img src="chocolate_icecream.jpg" alt="Chocolate Ice Cream">
            <div class="name">Chocolate Ice Cream</div>
            <div class="details">Rich and creamy chocolate delight.</div>
            <div class="price">₹149</div>
            <button class="add-btn">Add</button>
        </div>

        <div class="card">
            <img src="strawberry_icecream.jpg" alt="Strawberry Ice Cream">
            <div class="name">Strawberry Ice Cream</div>
            <div class="details">Smooth and fresh strawberry flavor.</div>
            <div class="price">₹129</div>
            <button class="add-btn">Add</button>
        </div>

        <div class="card">
            <img src="vanilla_icecream.jpg" alt="Vanilla Ice Cream">
            <div class="name">Vanilla Ice Cream</div>
            <div class="details">Classic vanilla with a creamy texture.</div>
            <div class="price">₹119</div>
            <button class="add-btn">Add</button>
        </div>
    </div>

</body>
</html>
